name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 根据 tag 写入版本号
        shell: pwsh
        run: |
          # 从 tag（如 v1.0.1 或 v1.0.1.5）解析版本号，覆盖 version.h
          $tag = '${{ github.ref_name }}'
          $ver = $tag.TrimStart('v', 'V')
          if ($ver -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            Write-Error "tag 格式不正确，应为 vX.Y.Z 或 vX.Y.Z.B，实际为: $tag"
            exit 1
          }
          $parts = $ver.Split('.')
          $major = $parts[0]
          $minor = $parts[1]
          $patch = $parts[2]
          $build = if ($parts.Length -ge 4) { $parts[3] } else { '0' }
          $short = "$major.$minor.$patch"
          $full  = "$major.$minor.$patch.$build"

          $content = @"
#pragma once

// 该文件在 CI 中根据推送的 v* tag 自动生成，请勿手动修改用于发布的版本号。
#define RAINFALL_VERSION_MAJOR $major
#define RAINFALL_VERSION_MINOR $minor
#define RAINFALL_VERSION_PATCH $patch
#define RAINFALL_VERSION_BUILD $build

#define RAINFALL_VERSION_STRING "$full"
#define RAINFALL_VERSION_STRING_SHORT "$short"
"@
          Set-Content -Path Rainfall\version.h -Value $content -Encoding UTF8
          Write-Host "已写入版本号: $full"
          Get-Content Rainfall\version.h

      - name: 编译 Release x64
        shell: pwsh
        run: |
          # 本地工程使用 v145 (VS2022)；GitHub 虚拟机可能没有该工具集，
          # 因此在命令行临时覆盖为可用的工具集，无需修改工程文件。
          $toolsets = @('v145', 'v144', 'v143')
          $built = $false
          foreach ($ts in $toolsets) {
            Write-Host "尝试使用工具集 $ts 编译..."
            msbuild Rainfall\Rainfall.vcxproj `
              /p:Configuration=Release `
              /p:Platform=x64 `
              /p:PlatformToolset=$ts `
              /m
            if ($LASTEXITCODE -eq 0) {
              Write-Host "使用 $ts 编译成功"
              $built = $true
              break
            }
            Write-Host "工具集 $ts 不可用或编译失败，尝试下一个..."
          }
          if (-not $built) {
            Write-Error "所有工具集均编译失败"
            exit 1
          }

      - name: 打包
        shell: pwsh
        run: |
          $exe = 'Rainfall\x64\Release\Rainfall.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "未找到编译产物: $exe"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe dist\
          Compress-Archive -Path dist\Rainfall.exe -DestinationPath "Rainfall-${{ github.ref_name }}-x64.zip" -Force

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: Rainfall-${{ github.ref_name }}-x64.zip
          generate_release_notes: true
